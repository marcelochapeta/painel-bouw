0sWE7v5cpUVbQSgmd6YUkKERnnGzSqlYoQmLJFvoJxNGo6pWp/8r00dxaR/8qAe3LQDWheXB/SouMEzjUoNtbh3CnH0fIsv/AHxap2KyHkT0QFzlQKu4SBSi3nee50JEBKlPnxJ1Oxz4lUWkZdaMybrP0IksyTbN76gsO1kbss7S1uOvpM9ecoGvtZ8nc8NmNYUKVX6+23IjNXddwXvt+SCJ/h2VzvV2gN3/N9x8WllfLiujCoctIVAFBBLrvVQo2rmHIcgXL8R1zqn0U="; const ITER=600000;
const MAX=3, ESPERA=5*60*1000;   // trava (bônus): 3 tentativas erradas -> espera 5 min
const b642bytes=b=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));
async function abrir(pwd){
  const raw=b642bytes(BLOB);
  const salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pwd),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);   // erro aqui = senha errada
  return new TextDecoder().decode(plain);
}
const pw=document.getElementById("pw"), go=document.getElementById("go"), err=document.getElementById("err");
function estado(){ try{return JSON.parse(localStorage.getItem("bouw_lock")||'{"fails":0,"until":0}');}catch(e){return {fails:0,until:0};} }
function salvar(s){ try{localStorage.setItem("bouw_lock",JSON.stringify(s));}catch(e){} }
let timer=null;
function bloqueado(){
  const s=estado(), restante=s.until-Date.now();
  if(restante>0){
    go.disabled=true; pw.disabled=true;
    const tot=Math.ceil(restante/1000), m=Math.floor(tot/60), seg=tot%60;
    err.textContent="Muitas tentativas. Espere "+m+":"+String(seg).padStart(2,"0")+" para tentar de novo.";
    clearTimeout(timer); timer=setTimeout(bloqueado,1000);
    return true;
  }
  go.disabled=false; pw.disabled=false; go.textContent="Entrar";
  if(s.until){ salvar({fails:0,until:0}); err.textContent=""; }
  return false;
}
async function tentar(){
  if(bloqueado()) return;
  err.textContent=""; go.disabled=true; go.textContent="Abrindo…";
  try{
    const html=extrairRT(await abrir(pw.value));        // extrai o token do 🔄 e limpa do html
    const f=document.getElementById("frame");
    f.onload=injetarBotao;                              // injeta o 🔄 no box preto ao carregar
    f.srcdoc=html; f.style.display="block"; document.getElementById("gate").style.display="none";
    setInterval(injetarBotao,1500);                     // re-injeta se o dash re-renderizar o box (troca de aba)
    senhaOk=pw.value;                                   // guarda p/ o refresh (só na memória da aba)
    salvar({fails:0,until:0});
  }catch(e){
    const s=estado(); s.fails=(s.fails||0)+1;
    if(s.fails>=MAX){ s.fails=0; s.until=Date.now()+ESPERA; salvar(s); bloqueado(); }
    else{ salvar(s); err.textContent="Senha incorreta. ("+(MAX-s.fails)+" tentativa(s) restante(s))"; go.disabled=false; go.textContent="Entrar"; pw.select(); }
  }
}
go.onclick=tentar; pw.onkeydown=e=>{if(e.key==="Enter")tentar();};
bloqueado();   // aplica um bloqueio pendente já ao abrir a página

// ── 🔄 ATUALIZAR DE VERDADE (dono 23/07: "quero q ele realmente atualize e conste a última
// atualização"): o clique grava um pedido no repo (token vem DENTRO do cifrado); o vigia no Mac
// vê o pedido em ≤60s, roda o robô completo (~5min) e republica; a página sonda e troca sozinha.
// O "atualizado DD/MM HH:MM" é o Last-Modified REAL do host (hora em que o robô publicou).
let senhaOk=null, rt=null;   // rt = {tok,owner,repo,branch} extraído do conteúdo decifrado
function extrairRT(html){
  const m=html.match(/<!--BOUW_RT:([^|]+)\|([^|]*)\|([^|]*)\|([^>-]*)-->/);
  if(m) rt={tok:m[1],owner:m[2],repo:m[3],branch:m[4]||"main"};
  return html.replace(/<!--BOUW_RT:[^>]*-->/,"");
}
// injeta os botões (mesma origem via srcdoc → o portão mexe no DOM do iframe direto):
//  • "atualizar tudo" no box preto #selo-dia (modo full: re-puxa e republica, ~5min)
//  • "republicar" no header da calculadora #viewPrecif (modo fast: regenera e publica, ~30s)
function mkBtn(doc,id,label,title,mode){
  const b=doc.createElement("button"); b.id=id; b.dataset.label=label; b.dataset.mode=mode; b.title=title;
  b.style.cssText="font:inherit;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(245,166,35,.5);"
    +"background:rgba(245,166,35,.14);color:#f5a623;border-radius:999px;padding:4px 12px;"
    +"display:inline-flex;align-items:center;gap:6px;margin-left:8px";
  b.innerHTML='<span class="bouw-ic" style="display:inline-block;font-size:13px">&#x21bb;</span>'
    +'<span class="bouw-rtxt">'+label+'</span>';
  b.onclick=function(){ atualizar(mode); };
  return b;
}
function injetarBotao(){
  try{
    const doc=document.getElementById("frame").contentDocument; if(!doc) return;
    const box=doc.getElementById("selo-dia");
    if(box && !doc.getElementById("bouw-ref")){
      const w=doc.createElement("div"); w.id="bouw-ref"; w.style.cssText="margin-top:9px";
      w.appendChild(mkBtn(doc,"bouw-refbtn","atualizar tudo","Re-puxa ML/Shopee/Tiny e republica (~5 min)","full"));
      box.appendChild(w);
    }
    const ph=doc.querySelector("#viewPrecif header");
    if(ph && !doc.getElementById("bouw-refcalc"))
      ph.appendChild(mkBtn(doc,"bouw-refcalc","republicar","Regenera os preços/margens e publica, sem re-puxar (~30s)","fast"));
  }catch(e){}
}
function _all(sel){ try{ return document.getElementById("frame").contentDocument.querySelectorAll(sel); }catch(e){ return []; } }
function refTxt(t){ _all(".bouw-rtxt").forEach(function(e){ e.textContent=t; }); }
function refReset(){ _all("[data-label]").forEach(function(b){ var s=b.querySelector(".bouw-rtxt"); if(s)s.textContent=b.dataset.label; }); }
function refGirar(on){ _all(".bouw-ic").forEach(function(i){ i.style.transition="transform .8s linear"; i.style.transform=on?"rotate(3600deg)":"none"; }); }
async function pedirRobo(mode){   // cria refresh-request.json no repo — o vigia do Mac atende (com o modo)
  const h={ "Authorization":"Bearer "+rt.tok, "Accept":"application/vnd.github+json" };
  const url="https://api.github.com/repos/"+rt.owner+"/"+rt.repo+"/contents/refresh-request.json";
  let sha=null;
  try{ const g=await fetch(url+"?ref="+rt.branch,{headers:h}); if(g.ok) sha=(await g.json()).sha; }catch(e){}
  const body={message:"pedido de atualização (botão do painel)",branch:rt.branch,
              content:btoa(JSON.stringify({ts:new Date().toISOString(),mode:mode||"full"}))};
  if(sha) body.sha=sha;
  const r=await fetch(url,{method:"PUT",headers:h,body:JSON.stringify(body)});
  if(!r.ok) throw new Error("pedido falhou: "+r.status);
}
async function baixarVersao(){   // re-baixa a página publicada e devolve o BLOB novo
  const r=await fetch(location.pathname+"?t="+Date.now(),{cache:"no-store"});
  const txt=await r.text();
  const m=txt.match(/let BLOB="([A-Za-z0-9+\/=]+)"/)||txt.match(/const BLOB="([A-Za-z0-9+\/=]+)"/);
  if(!m) throw new Error("blob não encontrado");
  return {blob:m[1], lm:r.headers.get("last-modified")};
}
async function aplicar(v){   // troca o conteúdo pela versão nova (o box já traz o "gerado" novo)
  BLOB=v.blob;
  const html=extrairRT(await abrir(senhaOk));
  document.getElementById("frame").srcdoc=html;   // f.onload re-injeta o botão sozinho
}
let atualizando=false;
async function atualizar(mode){
  if(!senhaOk||atualizando) return;
  mode=mode||"full"; atualizando=true; refGirar(true);
  const rodando=(mode==="fast")?"republicando…":"robô rodando…";
  try{
    if(location.protocol==="file:"){ location.reload(); return; }   // local: recarrega o arquivo
    const blobAntes=BLOB;
    if(rt){
      refTxt("chamando o robô…");
      await pedirRobo(mode);
      // sonda até a versão publicada MUDAR (fast ~30s, full ~5min; vigia pega o pedido em ≤60s)
      const fim=Date.now()+12*60*1000; let n=0;
      while(Date.now()<fim){
        await new Promise(r=>setTimeout(r,(mode==="fast")?8000:20000)); n++;
        const seg=n*((mode==="fast")?8:20);
        refTxt(rodando+" "+(seg<60?seg+"s":(Math.round(seg/60*10)/10)+"min"));
        try{ const v=await baixarVersao();
          if(v.blob!==blobAntes){ await aplicar(v); return; }   // trocou: box já traz o "gerado" novo
        }catch(e){}
      }
      refTxt("robô não respondeu (Mac ligado?)"); setTimeout(refReset,5000);
    }else{
      refTxt("buscando…");
      const v=await baixarVersao();
      if(v.blob!==blobAntes){ await aplicar(v); }
      else { refTxt("já era a mais recente"); setTimeout(refReset,3000); }
    }
  }catch(e){ refTxt("erro — tente de novo"); setTimeout(refReset,3000); }
  finally{ atualizando=false; refGirar(false); }
}
