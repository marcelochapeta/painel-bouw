<title>Painel Bouw — acesso</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#faf7f2;color:#141414;height:100vh;display:flex;align-items:center;justify-content:center}
#gate{width:min(360px,90vw);background:#fff;border:1px solid #e7e0d4;border-radius:16px;padding:28px 26px;box-shadow:0 4px 24px rgba(0,0,0,.06);text-align:center}
.logo{font-weight:800;font-size:1.3rem;letter-spacing:-.5px;margin-bottom:2px}.logo b{color:#f5a623}
.sub{font-size:.78rem;color:#8a8172;margin-bottom:18px}
input{width:100%;padding:12px 14px;font-size:1rem;border:2px solid #e7e0d4;border-radius:12px;background:#faf7f2;margin-bottom:10px}
input:focus{outline:none;border-color:#f5a623}
button{width:100%;padding:12px;font-size:.95rem;font-weight:700;border:none;border-radius:12px;background:#141414;color:#f5a623;cursor:pointer}
button:disabled{opacity:.6;cursor:wait}
.err{color:#c0392b;font-size:.8rem;margin-top:8px;min-height:1em}
#frame{position:fixed;inset:0;width:100vw;height:100vh;border:none;display:none;background:#faf7f2}
#refresh{position:fixed;top:10px;right:12px;z-index:99;display:none;align-items:center;gap:8px;
  background:#141414;color:#f5a623;border:none;border-radius:999px;padding:8px 14px;font-size:.82rem;
  font-weight:700;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.25);font-family:inherit}
#refresh .ic{display:inline-block;font-size:1rem;line-height:1}
#refresh.girando .ic{animation:gira 1s linear infinite}
@keyframes gira{to{transform:rotate(360deg)}}
#refresh .quando{font-weight:500;color:#e7e0d4}
</style></head><body>
<div id="gate">
  <div class="logo">BOUW<b>.</b>OBRA</div>
  <div class="sub">Painel diário · digite a senha para ver</div>
  <input id="pw" type="password" placeholder="senha" autocomplete="current-password" autofocus>
  <button id="go">Entrar</button>
  <div class="err" id="err"></div>
</div>
<iframe id="frame" title="Painel Bouw"></iframe>
<button id="refresh" title="Buscar a versão mais recente publicada">

const MAX=3, ESPERA=5*60*1000;   // trava (bônus): 3 tentativas erradas -> espera 5 min
const b642bytes=b=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));
async function abrir(pwd){
  const raw=b642bytes(BLOB);
  const salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pwd),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);   // erro aqui = senha errada
  return new TextDecoder().decode(plain);
}
const pw=document.getElementById("pw"), go=document.getElementById("go"), err=document.getElementById("err");
function estado(){ try{return JSON.parse(localStorage.getItem("bouw_lock")||'{"fails":0,"until":0}');}catch(e){return {fails:0,until:0};} }
function salvar(s){ try{localStorage.setItem("bouw_lock",JSON.stringify(s));}catch(e){} }
let timer=null;
function bloqueado(){
  const s=estado(), restante=s.until-Date.now();
  if(restante>0){
    go.disabled=true; pw.disabled=true;
    const tot=Math.ceil(restante/1000), m=Math.floor(tot/60), seg=tot%60;
    err.textContent="Muitas tentativas. Espere "+m+":"+String(seg).padStart(2,"0")+" para tentar de novo.";
    clearTimeout(timer); timer=setTimeout(bloqueado,1000);
    return true;
  }
  go.disabled=false; pw.disabled=false; go.textContent="Entrar";
  if(s.until){ salvar({fails:0,until:0}); err.textContent=""; }
  return false;
}
async function tentar(){
  if(bloqueado()) return;
  err.textContent=""; go.disabled=true; go.textContent="Abrindo…";
  try{
    const html=extrairRT(await abrir(pw.value));        // extrai o token do 🔄 e limpa do html
    const f=document.getElementById("frame");
    f.srcdoc=html; f.style.display="block"; document.getElementById("gate").style.display="none";
    senhaOk=pw.value;                                   // guarda p/ o refresh (só na memória da aba)
    document.getElementById("refresh").style.display="flex";
    marcarQuando(document.lastModified);
    salvar({fails:0,until:0});
  }catch(e){
    const s=estado(); s.fails=(s.fails||0)+1;
    if(s.fails>=MAX){ s.fails=0; s.until=Date.now()+ESPERA; salvar(s); bloqueado(); }
    else{ salvar(s); err.textContent="Senha incorreta. ("+(MAX-s.fails)+" tentativa(s) restante(s))"; go.disabled=false; go.textContent="Entrar"; pw.select(); }
  }
}
go.onclick=tentar; pw.onkeydown=e=>{if(e.key==="Enter")tentar();};
bloqueado();   // aplica um bloqueio pendente já ao abrir a página

// ── 🔄 ATUALIZAR DE VERDADE (dono 23/07: "quero q ele realmente atualize e conste a última
// atualização"): o clique grava um pedido no repo (token vem DENTRO do cifrado); o vigia no Mac
// vê o pedido em ≤60s, roda o robô completo (~5min) e republica; a página sonda e troca sozinha.
// O "atualizado DD/MM HH:MM" é o Last-Modified REAL do host (hora em que o robô publicou).
let senhaOk=null, rt=null;   // rt = {tok,owner,repo,branch} extraído do conteúdo decifrado
function extrairRT(html){
  const m=html.match(/<!--BOUW_RT:([^|]+)\|([^|]*)\|([^|]*)\|([^>-]*)-->/);
  if(m) rt={tok:m[1],owner:m[2],repo:m[3],branch:m[4]||"main"};
  return html.replace(/<!--BOUW_RT:[^>]*-->/,"");
}
function marcarQuando(lm){
  try{
    const d=lm?new Date(lm):new Date();
    const p=n=>String(n).padStart(2,"0");
    document.getElementById("refquando").textContent=
      "atualizado "+p(d.getDate())+"/"+p(d.getMonth()+1)+" "+p(d.getHours())+":"+p(d.getMinutes());
  }catch(e){}
}
async function pedirRobo(){   // cria refresh-request.json no repo — o vigia do Mac atende
  const h={ "Authorization":"Bearer "+rt.tok, "Accept":"application/vnd.github+json" };
  const url="https://api.github.com/repos/"+rt.owner+"/"+rt.repo+"/contents/refresh-request.json";
  let sha=null;
  try{ const g=await fetch(url+"?ref="+rt.branch,{headers:h}); if(g.ok) sha=(await g.json()).sha; }catch(e){}
  const body={message:"pedido de atualização (botão do painel)",branch:rt.branch,
              content:btoa(JSON.stringify({ts:new Date().toISOString()}))};
  if(sha) body.sha=sha;
  const r=await fetch(url,{method:"PUT",headers:h,body:JSON.stringify(body)});
  if(!r.ok) throw new Error("pedido falhou: "+r.status);
}
async function baixarVersao(){   // re-baixa a página publicada e devolve o BLOB novo
  const r=await fetch(location.pathname+"?t="+Date.now(),{cache:"no-store"});
  const txt=await r.text();
  const m=txt.match(/let BLOB="([A-Za-z0-9+\/=]+)"/)||txt.match(/const BLOB="([A-Za-z0-9+\/=]+)"/);
  if(!m) throw new Error("blob não encontrado");
  return {blob:m[1], lm:r.headers.get("last-modified")};
}
async function aplicar(v){
  BLOB=v.blob;
  const html=extrairRT(await abrir(senhaOk));
  document.getElementById("frame").srcdoc=html;
  marcarQuando(v.lm);
}
async function atualizar(){
  const b=document.getElementById("refresh"), t=document.getElementById("reftxt");
  if(!senhaOk||b.classList.contains("girando")) return;
  b.classList.add("girando");
  try{
    if(location.protocol==="file:"){ location.reload(); return; }   // local: recarrega o arquivo
    const blobAntes=BLOB;
    if(rt){
      t.textContent="chamando o robô…";
      await pedirRobo();
      // sonda até a versão publicada MUDAR (robô leva ~5min; vigia pega o pedido em ≤60s)
      const fim=Date.now()+12*60*1000;
      let n=0;
      while(Date.now()<fim){
        await new Promise(r=>setTimeout(r,20000)); n++;
        t.textContent="robô rodando… "+Math.round(n*20/60*10)/10+"min";
        try{
          const v=await baixarVersao();
          if(v.blob!==blobAntes){ await aplicar(v); t.textContent="atualizado ✓ (dados novos)";
            setTimeout(()=>{t.textContent="atualizar";},4000); return; }
        }catch(e){}
      }
      t.textContent="robô não respondeu (Mac ligado?)";
      setTimeout(()=>{t.textContent="atualizar";},5000);
    }else{
      t.textContent="buscando…";
      const v=await baixarVersao();
      await aplicar(v);
      t.textContent=(v.blob===blobAntes)?"já era a mais recente":"atualizado ✓";
      setTimeout(()=>{t.textContent="atualizar";},3000);
    }
  }catch(e){ t.textContent="erro — tente de novo"; setTimeout(()=>{t.textContent="atualizar";},3000); }
  finally{ b.classList.remove("girando"); }
}
document.getElementById("refresh").onclick=atualizar;
</script></body></html>
